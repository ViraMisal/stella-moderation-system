target-version = "py312"
line-length = 120

[lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",   # line too long
    "E711",   # comparison to None — SQLAlchemy
    "E712",   # comparison to True/False — SQLAlchemy
]

[lint.per-file-ignores]
"tests/*" = ["E501"]
"run.py" = ["E402"]
"scripts/*" = ["E402"]
