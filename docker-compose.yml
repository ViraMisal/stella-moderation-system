services:

  bot:
    build: .
    command: python run.py bot
    restart: unless-stopped
    volumes:
      - data:/data
      - logs:/logs
    env_file: .env
    environment:
      - ENV=production
      - DATA_DIR=/data
      - LOG_DIR=/logs
      - GUNICORN_BIND=0.0.0.0:8000
    depends_on: []

  web:
    build: .
    command: gunicorn -c gunicorn_conf.py wsgi:app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - data:/data
      - logs:/logs
    env_file: .env
    environment:
      - ENV=production
      - DATA_DIR=/data
      - LOG_DIR=/logs
      - GUNICORN_BIND=0.0.0.0:8000
      - TRUST_PROXY_HEADERS=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  health:
    build:
      context: services/health
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - data:/data:ro
    environment:
      - DATABASE_PATH=/data/app.db
      - HEALTH_PORT=9090
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  data:
  logs:

# Примечание: оба контейнера пишут в один SQLite-файл через shared volume.
# Это работает для небольшой нагрузки. Для высокой нагрузки переходите на PostgreSQL
# (измените DATABASE_URL в .env).
