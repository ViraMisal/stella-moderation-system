{% extends "base.html" %}

{% block title %}Ошибка {{ error_code }}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="text-center">
        <div class="mb-8">
            {% if error_code == 404 %}
                <i class="fas fa-search text-9xl text-purple-300 mb-6"></i>
            {% elif error_code == 500 %}
                <i class="fas fa-exclamation-triangle text-9xl text-red-300 mb-6"></i>
            {% else %}
                <i class="fas fa-exclamation-circle text-9xl text-yellow-300 mb-6"></i>
            {% endif %}
        </div>
        
        <h1 class="text-6xl font-bold text-gray-900 mb-4">{{ error_code }}</h1>
        <p class="text-2xl text-gray-600 mb-8">{{ error_message }}</p>
        
        <div class="space-x-4">
            <a href="{{ url_for('dashboard.dashboard') if session.admin else url_for('auth.login') }}" class="inline-flex items-center px-6 py-3 bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-semibold rounded-lg hover:from-purple-700 hover:to-indigo-700 transition transform hover:scale-105">
                <i class="fas fa-home mr-2"></i>
                На главную
            </a>
            <a href="javascript:history.back()" class="inline-flex items-center px-6 py-3 bg-gray-200 text-gray-700 font-semibold rounded-lg hover:bg-gray-300 transition transform hover:scale-105">
                <i class="fas fa-arrow-left mr-2"></i>
                Назад
            </a>
        </div>
    </div>
</div>
{% endblock %}
